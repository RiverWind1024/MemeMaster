name: CI

on:
  push:
    branches: [master, release/*, feat/*]
    tags: ['v*']
  pull_request:
    branches: [master, release/*]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  flutter-version: '3.44.0'
  java-version: '17'
  VERSION: '1.0.0'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Flutter
        run: |
          FLUTTER_VERSION=3.44.0
          if [ ! -d "$HOME/flutter" ]; then
            curl -sSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz | tar xJ -C $HOME
          fi
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build clang libsecret-1-dev libgtk-3-dev \
            unzip curl xz-utils tesseract-ocr tesseract-ocr-chi-sim \
            libvulkan1 libvulkan-dev mesa-vulkan-drivers vulkan-validationlayers \
            glslang-dev glslang-tools spirv-tools glslc

      - name: Setup Flutter
        run: |
          FLUTTER_VERSION=3.44.0
          if [ ! -d "$HOME/flutter" ]; then
            curl -sSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz | tar xJ -C $HOME
          fi
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Init third-party (Vulkan)
        run: |
          echo "=== Running init-third-party.sh ==="
          ./scripts/init-third-party.sh 2>&1 | tee /tmp/init-output.txt
          INIT_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "=== init-third-party.sh exit code: $INIT_EXIT ==="
          if [ $INIT_EXIT -ne 0 ]; then
            echo "⚠️ Script exited with error (see above)"
          fi
          echo ""
          echo "=== third_party contents ==="
          ls -la third_party/ 2>/dev/null || echo "third_party missing"
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp
          SPIRV_HEADERS_DIR: ${{ github.workspace }}/third_party/spirv-headers-install

      - name: Build native library (Vulkan)
        run: |
          mkdir -p build/linux-llm
          cd build/linux-llm
          cmake ../../linux/cpp \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_CPP_DIR="$GITHUB_WORKSPACE/third_party/llama.cpp" \
            -DSPIRV_HEADERS_DIR="$GITHUB_WORKSPACE/third_party/spirv-headers-install" \
            -DENABLE_VULKAN=ON
          cmake --build . -j$(nproc)
          echo "=== Build artifacts ==="
          ls -lh libmeme_llm* 2>/dev/null || echo "No libmeme_llm found"

      - name: Build Linux (Vulkan GPU)
        run: |
          rm -rf build/linux
          flutter build linux --release

      - name: Bundle native library
        run: |
          mkdir -p build/linux/x64/release/bundle/lib
          cp build/linux-llm/libmeme_llm.so build/linux/x64/release/bundle/lib/
          echo "✓ Copied libmeme_llm.so to bundle"

      - name: Verify GPU library
        run: |
          LIB=build/linux/x64/release/bundle/lib/libmeme_llm.so
          if [ -f "$LIB" ]; then
            SIZE=$(stat -c%s "$LIB" | numfmt --to=iec)
            echo "libmeme_llm.so size: $SIZE"
            # 列出所有 ggml_* 后端符号，便于诊断
            echo "=== ggml backend symbols ==="
            nm "$LIB" 2>/dev/null | grep -oE "ggml_(vulkan|opencl|cuda|metal|cpu|backend)" | sort -u
            if nm "$LIB" 2>/dev/null | grep -q ggml_vulkan; then
              echo "✓ Vulkan backend built"
            else
              echo "✗ No Vulkan symbols - stub version built"
            fi
          elif [ -f build/linux/x64/release/bundle/lib/libmeme_llm_empty.so ]; then
            echo "⚠ Only stub library built (no GPU support)"
          else
            echo "✗ No meme_llm library found"
            exit 1
          fi

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-linux-x64-vulkan
          path: build/linux/x64/release/bundle/
          retention-days: 7

  linux-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build clang libsecret-1-dev libgtk-3-dev \
            unzip curl xz-utils tesseract-ocr tesseract-ocr-chi-sim

      - name: Setup Flutter
        run: |
          FLUTTER_VERSION=3.44.0
          if [ ! -d "$HOME/flutter" ]; then
            curl -sSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz | tar xJ -C $HOME
          fi
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Init third-party (CPU only)
        run: |
          echo "=== Running init-third-party.sh ==="
          ./scripts/init-third-party.sh 2>&1 | tee /tmp/init-output.txt
          INIT_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "=== init-third-party.sh exit code: $INIT_EXIT ==="
          if [ $INIT_EXIT -ne 0 ]; then
            echo "⚠️ Script exited with error (see above)"
          fi
          echo ""
          echo "=== third_party contents ==="
          ls -la third_party/ 2>/dev/null || echo "third_party missing"
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp

      - name: Build Linux (CPU only)
        run: |
          rm -rf build/linux
          flutter build linux --release

      - name: Verify CPU-only library
        run: |
          LIB=build/linux/x64/release/bundle/lib/libmeme_llm.so
          if [ -f "$LIB" ]; then
            SIZE=$(stat -c%s "$LIB" | numfmt --to=iec)
            echo "libmeme_llm.so size: $SIZE"
            echo "=== ggml backend symbols (expect NO vulkan/opencl) ==="
            nm -D "$LIB" 2>/dev/null | grep -oE "ggml_(vulkan|opencl|cuda|metal|cpu|backend)" | sort -u
            if nm -D "$LIB" 2>/dev/null | grep -q ggml_vulkan; then
              echo "✗ Unexpected: Vulkan symbols found (should be CPU only)"
            else
              echo "✓ CPU-only build (no Vulkan)"
            fi
          elif [ -f build/linux/x64/release/bundle/lib/libmeme_llm_empty.so ]; then
            echo "⚠ Only stub library built"
          else
            echo "✗ No meme_llm library found"
            exit 1
          fi

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-linux-x64-cpu
          path: build/linux/x64/release/bundle/
          retention-days: 7

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install macOS dependencies
        run: |
          brew install tesseract tesseract-lang leptonica

      - name: Setup Flutter
        run: |
          FLUTTER_VERSION=3.44.0
          if [ ! -d "$HOME/flutter" ]; then
            # macos 用 zip 格式（不是 tar.xz），用 unzip 解压
            curl -sSL "https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_${FLUTTER_VERSION}-stable.zip" -o /tmp/flutter.zip
            unzip -q /tmp/flutter.zip -d $HOME
            rm /tmp/flutter.zip
          fi
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Init third-party (clone deps)
        run: |
          echo "=== Running init-third-party.sh ==="
          ./scripts/init-third-party.sh 2>&1 | tee /tmp/init-output.txt
          INIT_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "=== init-third-party.sh exit code: $INIT_EXIT ==="
          if [ $INIT_EXIT -ne 0 ]; then
            echo "⚠️ Script exited with error (see above)"
          fi
          echo ""
          echo "=== third_party contents ==="
          ls -la third_party/ 2>/dev/null || echo "third_party missing"
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp

      - name: Build LLM (Metal)
        run: bash -x ./scripts/build-macos-llm.sh 2>&1 | tail -100
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp

      - name: Build macOS
        run: flutter build macos --release

      - name: Bundle native library into app
        run: |
          APP=$(find build/macos/Build/Products/Release -name "*.app" -type d | head -1)
          FRAMEWORKS="$APP/Contents/Frameworks"
          mkdir -p "$FRAMEWORKS"
          cp build/macos-llm/libmeme_llm.dylib "$FRAMEWORKS/"
          echo "✓ Copied libmeme_llm.dylib to $FRAMEWORKS"
          ls -lh "$FRAMEWORKS"/libmeme_llm.dylib

      - name: Verify Metal library
        run: |
          LIB=$(find build/macos/Build/Products/Release -name "libmeme_llm*.dylib" -type f 2>/dev/null | head -1)
          if [ -n "$LIB" ]; then
            ls -lh "$LIB"
            if nm "$LIB" 2>/dev/null | grep -q ggml_metal; then
              echo "✓ Metal symbols found"
            else
              echo "⚠ No Metal symbols"
            fi
          else
            echo "✗ No meme_llm library found"
            exit 1
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-macos-arm64-metal
          # 只上传 .app，跳过 .dSYM（debug symbols，会膨胀到 200MB+）
          path: build/macos/Build/Products/Release/*.app
          retention-days: 7

  macos-cpu:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install macOS dependencies
        run: |
          brew install tesseract tesseract-lang leptonica

      - name: Setup Flutter
        run: |
          FLUTTER_VERSION=3.44.0
          if [ ! -d "$HOME/flutter" ]; then
            curl -sSL "https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_${FLUTTER_VERSION}-stable.zip" -o /tmp/flutter.zip
            unzip -q /tmp/flutter.zip -d $HOME
            rm /tmp/flutter.zip
          fi
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Init third-party (CPU only)
        run: ./scripts/init-third-party.sh
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp

      - name: Build LLM (CPU)
        run: bash -x ./scripts/build-macos-llm.sh 2>&1 | tail -100
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp
          ENABLE_METAL: "OFF"

      - name: Build macOS
        run: flutter build macos --release

      - name: Bundle native library into app
        run: |
          APP=$(find build/macos/Build/Products/Release -name "*.app" -type d | head -1)
          FRAMEWORKS="$APP/Contents/Frameworks"
          mkdir -p "$FRAMEWORKS"
          cp build/macos-llm/libmeme_llm.dylib "$FRAMEWORKS/"
          echo "✓ Copied libmeme_llm.dylib to $FRAMEWORKS"
          ls -lh "$FRAMEWORKS"/libmeme_llm.dylib

      - name: Verify CPU-only library
        run: |
          LIB=$(find build/macos/Build/Products/Release -name "libmeme_llm*.dylib" -type f 2>/dev/null | head -1)
          if [ -n "$LIB" ]; then
            ls -lh "$LIB"
            echo "=== ggml backend symbols (expect NO metal) ==="
            nm "$LIB" 2>/dev/null | grep -oE "ggml_(metal|vulkan|opencl|cuda|cpu|backend)" | sort -u
            if nm "$LIB" 2>/dev/null | grep -q ggml_metal; then
              echo "✗ Unexpected: Metal symbols found (should be CPU only)"
            else
              echo "✓ CPU-only build (no Metal)"
            fi
          else
            echo "✗ No meme_llm library found"
            exit 1
          fi

      - name: Upload macOS CPU artifact
        uses: actions/upload-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-macos-arm64-cpu
          path: build/macos/Build/Products/Release/*.app
          retention-days: 7

  android-vulkan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build unzip curl xz-utils
      - name: Setup Flutter
        run: |
          FLUTTER_VERSION=3.44.0
          if [ ! -d "$HOME/flutter" ]; then
            curl -sSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz | tar xJ -C $HOME
          fi
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v3

      # Pre-fetch gradle distribution to avoid timeout during gradlew run
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Init third-party
        run: ./scripts/init-third-party.sh || echo "⚠️ Network issues - building stub"

      - name: Debug SPIRV-Headers install
        run: |
          echo "=== third_party contents ==="
          ls -la third_party/
          echo ""
          echo "=== spirv-headers-install ==="
          ls -la third_party/spirv-headers-install/ 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== SPIRV-HeadersConfig.cmake ==="
          find third_party -name "SPIRV-HeadersConfig.cmake" 2>/dev/null
          find third_party -name "spirv-headers*" -type d 2>/dev/null
          echo ""
          echo "=== Manual SPIRV-Headers cmake (if needed) ==="
          if [ ! -f third_party/spirv-headers-install/share/cmake/SPIRV-Headers/SPIRV-HeadersConfig.cmake ]; then
            echo "Running cmake manually to diagnose..."
            cd third_party/SPIRV-Headers
            mkdir -p build
            cd build
            cmake .. -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/third_party/spirv-headers-install" -DSPIRV_HEADERS_SKIP_EXAMPLES=ON 2>&1 | tail -20
            echo "--- cmake build ---"
            cmake --build . --target install 2>&1 | tail -30
          fi

      - name: Configure Gradle memory
        run: |
          mkdir -p android
          echo "org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m" > android/gradle.properties
           echo "org.gradle.parallel=true" >> android/gradle.properties
           echo "android.useAndroidX=true" >> android/gradle.properties
           echo "android.enableJetifier=false" >> android/gradle.properties

      - name: Build Android APK
        run: |
          flutter build apk --release 2>&1
          echo "=== Build exit code: $? ==="
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK: ${{ env.ANDROID_NDK }}
          GRADLE_OPTS: "-Dorg.gradle.caching=false"

      - name: Verify APK size
        run: |
          echo "=== Check flutter-apk ==="
          ls -la build/app/outputs/flutter-apk/ 2>&1 || echo "No flutter-apk dir"
          echo "=== Final check ==="
          APK="build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK" ]; then
            SIZE=$(stat -c%s "$APK" | numfmt --to=iec)
            echo "APK: $APK"
            echo "Size: $SIZE"
          else
            echo "⚠ No APK found at $APK"
            exit 1
          fi

      - name: Find and copy APK
        run: |
          # Flutter builds APK to build/app/outputs/flutter-apk/
          # 直接复制正确路径，避免 find 选错文件
          cp build/app/outputs/flutter-apk/app-release.apk ./android.apk
          ls -la ./android.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-android-arm64-vulkan
          path: android.apk
          retention-days: 7

  android-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build unzip curl xz-utils
      - name: Setup Flutter
        run: |
          FLUTTER_VERSION=3.44.0
          if [ ! -d "$HOME/flutter" ]; then
            curl -sSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz | tar xJ -C $HOME
          fi
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v3

      # Pre-fetch gradle distribution to avoid timeout during gradlew run
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Init third-party
        run: ./scripts/init-third-party.sh || echo "⚠️ Network issues - building stub"

      - name: Configure Gradle memory
        run: |
          mkdir -p android
          echo "org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m" > android/gradle.properties
           echo "org.gradle.parallel=true" >> android/gradle.properties
           echo "android.useAndroidX=true" >> android/gradle.properties
           echo "android.enableJetifier=false" >> android/gradle.properties

      - name: Build Android APK (CPU only)
        run: |
          flutter build apk --release 2>&1
          echo "=== Build exit code: $? ==="
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK: ${{ env.ANDROID_NDK }}
          ANDROID_CPU_ONLY: "1"
          GRADLE_OPTS: "-Dorg.gradle.caching=false"

      - name: Verify APK size
        run: |
          echo "=== Find all APK files ==="
          find . -name "*.apk" -type f 2>&1 | head -20
          echo "=== Check build/app/outputs/flutter-apk ==="
          ls -la build/app/outputs/flutter-apk/ 2>&1 || echo "No flutter-apk dir"
          echo "=== Final check ==="
          APK="build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK" ]; then
            SIZE=$(stat -c%s "$APK" | numfmt --to=iec)
            echo "APK: $APK"
            echo "Size: $SIZE"
          else
            echo "⚠ No APK found at $APK"
            exit 1
          fi

      - name: Find and copy APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk ./android.apk
          ls -la ./android.apk

      - name: Upload Android CPU artifact
        uses: actions/upload-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-android-arm64-cpu
          path: android.apk
          retention-days: 7

  release:
    needs: [linux, linux-cpu, macos, macos-cpu, android-vulkan, android-cpu]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download Linux Vulkan
        uses: actions/download-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-linux-x64-vulkan
          path: artifacts/linux-vulkan

      - name: Download Linux CPU
        uses: actions/download-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-linux-x64-cpu
          path: artifacts/linux-cpu

      - name: Download macOS Metal
        uses: actions/download-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-macos-arm64-metal
          path: artifacts/macos-metal

      - name: Download macOS CPU
        uses: actions/download-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-macos-arm64-cpu
          path: artifacts/macos-cpu

      - name: Download Android Vulkan
        uses: actions/download-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-android-arm64-vulkan
          path: artifacts/android-vulkan

      - name: Download Android CPU
        uses: actions/download-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-android-arm64-cpu
          path: artifacts/android-cpu

      - name: Debug artifacts structure
        run: |
          echo "=== Linux Vulkan bundle ==="
          find artifacts/linux-vulkan -type f | head -10
          echo "=== Linux CPU bundle ==="
          find artifacts/linux-cpu -type f | head -10
          echo "=== macOS Metal ==="
          find artifacts/macos-metal -type f | head -10
          echo "=== macOS CPU ==="
          find artifacts/macos-cpu -type f | head -10
          echo "=== Android ==="
          find artifacts/android* -type f | head -10

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          name: MemeMaster v${{ env.VERSION }}
          body: "Release v${{ env.VERSION }}"
          files: |
            artifacts/linux-vulkan/bundle/lib/libmeme_llm.so
            artifacts/linux-vulkan/bundle/meme_master
            artifacts/linux-cpu/bundle/lib/libmeme_llm.so
            artifacts/linux-cpu/bundle/meme_master
            artifacts/macos-metal/mememaster.app.zip
            artifacts/macos-cpu/mememaster.app.zip
            artifacts/android-vulkan/android.apk
            artifacts/android-cpu/android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
