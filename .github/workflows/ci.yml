name: CI

on:
  push:
    branches: [master, release/*, feat/*]
  pull_request:
    branches: [master, release/*]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  flutter-version: '3.44.0'
  java-version: '17'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Flutter
        uses: actions/setupFlutter@v5
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  linux:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build clang libsecret-1-dev libgtk-3-dev \
            tesseract tesseract-langpack-chi_sim vulkan-loader spirv-tools

      - name: Setup Flutter
        uses: actions/setupFlutter@v5
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Install Android NDK (for glslc)
        uses: ntt241298-lab/setup-ndk@v1
        with:
          ndk-version: r28b

      - name: Init third-party (Vulkan)
        run: ./scripts/init-third-party.sh || echo "⚠️ Network issues - building stub"
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp
          SPIRV_HEADERS_DIR: ${{ github.workspace }}/third_party/spirv-headers-install

      - name: Build Linux (Vulkan GPU)
        run: |
          rm -rf build/linux
          export ANDROID_NDK=${{ github.workspace }}/ndk/28b
          export GLSLC_DIR=${{ github.workspace }}/ndk/28b/shader-tools/linux-x86_64
          flutter build linux --release

      - name: Verify GPU library
        run: |
          if [ -f build/linux/x64/release/bundle/lib/libmeme_llm.so ]; then
            SIZE=$(stat -c%s build/linux/x64/release/bundle/lib/libmeme_llm.so | numfmt --to=iec-i8)
            echo "libmeme_llm.so size: $SIZE"
            if nm build/linux/x64/release/bundle/lib/libmeme_llm.so 2>/dev/null | grep -q ggml_vulkan; then
              echo "✓ Vulkan symbols found"
            else
              echo "✗ No Vulkan symbols - stub version built"
            fi
          elif [ -f build/linux/x64/release/bundle/lib/libmeme_llm_empty.so ]; then
            echo "⚠ Only stub library built (no GPU support)"
          else
            echo "✗ No meme_llm library found"
            exit 1
          fi

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-vulkan-${{ github.sha }}
          path: build/linux/x64/release/bundle/
          retention-days: 7

  linux-cpu:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build clang libsecret-1-dev libgtk-3-dev \
            tesseract tesseract-langpack-chi_sim

      - name: Setup Flutter
        uses: actions/setupFlutter@v5
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Init third-party (CPU only)
        run: ./scripts/init-third-party.sh
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp

      - name: Build Linux (CPU only)
        run: |
          rm -rf build/linux
          flutter build linux --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-cpu-${{ github.sha }}
          path: build/linux/x64/release/bundle/
          retention-days: 7

  macos:
    needs: analyze
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install macOS dependencies
        run: |
          brew install tesseract tesseract-langpack-chi_sim leptonica

      - name: Setup Flutter
        uses: actions/setupFlutter@v5
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Init third-party
        run: ./scripts/init-third-party.sh
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp

      - name: Build C++ library (Metal GPU)
        run: ./scripts/build-macos-llm.sh
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp

      - name: Build macOS
        run: flutter build macos --release

      - name: Verify Metal library
        run: |
          find build/macos -name "libmeme_llm*.dylib" -type f 2>/dev/null | while read f; do
            SIZE=$(stat -f%z "$f" | numfmt --to=iec-i8)
            echo "$f size: $SIZE"
            if nm "$f" 2>/dev/null | grep -q ggml_metal; then
              echo "✓ Metal symbols found in $f"
            else
              echo "⚠ No Metal symbols in $f"
            fi
          done
          if ! find build/macos -name "libmeme_llm*.dylib" -type f 2>/dev/null | grep -q .; then
            echo "⚠ No meme_llm library found (stub version)"
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ github.sha }}
          path: build/macos/Build/Products/Release/
          retention-days: 7

  android:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build unzip

      - name: Setup Java
        uses: actions/setupJava@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.java-version }}

      - name: Setup Flutter
        uses: actions/setupFlutter@v5
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v3

      - name: Init third-party
        run: ./scripts/init-third-party.sh || echo "⚠️ Network issues - building stub"

      - name: Build Android APK
        run: flutter build apk --release
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK: ${{ env.ANDROID_NDK }}

      - name: Verify APK size
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(stat -c%s "$APK" | numfmt --to=iec-i8)
            echo "APK: $APK"
            echo "Size: $SIZE"
          else
            echo "⚠ No APK found"
          fi

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7

  android-debug:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build unzip

      - name: Setup Java
        uses: actions/setupJava@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.java-version }}

      - name: Setup Flutter
        uses: actions/setupFlutter@v5
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Init third-party
        run: ./scripts/init-third-party.sh || echo "⚠️ Network issues - building stub"

      - name: Build Android APK (debug)
        run: flutter build apk --debug
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Android debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
