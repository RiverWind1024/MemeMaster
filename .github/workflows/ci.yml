name: CI

on:
  push:
    branches: [master, release/*, feat/*]
    tags: ['v*']
  pull_request:
    branches: [master, release/*]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

env:
  flutter-version: '3.44.0'
  java-version: '17'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Flutter
        run: |
          FLUTTER_VERSION=3.44.0
          if [ ! -d "$HOME/flutter" ]; then
            curl -sSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz | tar xJ -C $HOME
          fi
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Extract version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build clang libsecret-1-dev libgtk-3-dev \
            unzip curl xz-utils \
            libvulkan1 libvulkan-dev mesa-vulkan-drivers vulkan-validationlayers \
            glslang-dev glslang-tools spirv-tools glslc

      - name: Setup Flutter
        run: |
          FLUTTER_VERSION=3.44.0
          if [ ! -d "$HOME/flutter" ]; then
            curl -sSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz | tar xJ -C $HOME
          fi
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Init third-party (Vulkan)
        run: |
          echo "=== Running init-third-party.sh ==="
          ./scripts/init-third-party.sh 2>&1 | tee /tmp/init-output.txt
          INIT_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "=== init-third-party.sh exit code: $INIT_EXIT ==="
          if [ $INIT_EXIT -ne 0 ]; then
            echo "⚠️ Script exited with error (see above)"
          fi
          echo ""
          echo "=== third_party contents ==="
          ls -la third_party/ 2>/dev/null || echo "third_party missing"
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp
          SPIRV_HEADERS_DIR: ${{ github.workspace }}/third_party/spirv-headers-install
          TESSERACT_DIR: ${{ github.workspace }}/third_party/tesseract
          LEPTONICA_DIR: ${{ github.workspace }}/third_party/leptonica

      - name: Build native library (Vulkan)
        run: |
          mkdir -p build/linux-llm
          cd build/linux-llm
          cmake ../../linux/cpp \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/third_party/linux-llm-install" \
            -DLLAMA_CPP_DIR="$GITHUB_WORKSPACE/third_party/llama.cpp" \
            -DTESSERACT_DIR="$GITHUB_WORKSPACE/third_party/tesseract" \
            -DLEPTONICA_DIR="$GITHUB_WORKSPACE/third_party/leptonica" \
            -DSPIRV_HEADERS_DIR="$GITHUB_WORKSPACE/third_party/spirv-headers-install" \
            -DENABLE_VULKAN=ON
          cmake --build . -j$(nproc)
          cmake --install . --config Release
          echo "=== Build artifacts ==="
          ls -lh libmeme_llm* 2>/dev/null || echo "No libmeme_llm found"
          ls -lh libtesseract_ocr* 2>/dev/null || echo "No libtesseract_ocr found"

      - name: Build Linux (Vulkan GPU)
        run: |
          rm -rf build/linux
          flutter build linux --release

      - name: Download and bundle tessdata (Linux)
        run: |
          TESSDATA_DIR="build/linux/x64/release/bundle/share/tessdata"
          mkdir -p "$TESSDATA_DIR"

          # 下载 tessdata 文件（eng + chi_sim）
          TESSDATA_URL="https://raw.githubusercontent.com/tesseract-ocr/tessdata/main"
          for lang in eng chi_sim; do
            if [ ! -f "$TESSDATA_DIR/${lang}.traineddata" ]; then
              echo "Downloading ${lang}.traineddata..."
              curl -sSL "${TESSDATA_URL}/${lang}.traineddata" -o "$TESSDATA_DIR/${lang}.traineddata"
            else
              echo "${lang}.traineddata already exists"
            fi
          done

          echo "=== Tessdata files ==="
          ls -lh "$TESSDATA_DIR"/*.traineddata 2>/dev/null || echo "No tessdata found"

      - name: Bundle native library
        run: |
          mkdir -p build/linux/x64/release/bundle/lib
          cp build/linux-llm/libmeme_llm.so build/linux/x64/release/bundle/lib/
          echo "✓ Copied libmeme_llm.so to bundle"

          # tesseract 安装目录
          TESS_INSTALL="$GITHUB_WORKSPACE/third_party/linux-llm-install"

          # 复制 tesseract_ocr 封装库（如果存在）
          for dir in "build/linux-llm" "$TESS_INSTALL/lib"; do
            if [ -f "$dir/libtesseract_ocr.so" ]; then
              cp "$dir/libtesseract_ocr.so" build/linux/x64/release/bundle/lib/
              echo "✓ Copied libtesseract_ocr.so to bundle"
              break
            fi
          done
          if [ ! -f "build/linux/x64/release/bundle/lib/libtesseract_ocr.so" ]; then
            echo "NOTE: libtesseract_ocr.so not found (OCR may use CLI fallback)"
          fi

          # 复制 tesseract 和 leptonica 库（如果存在）
          for lib in libtesseract.so libtesseract.so.5 libleptonica.so libleptonica.so.1; do
            for dir in "build/linux-llm" "$TESS_INSTALL/lib"; do
              if [ -f "$dir/$lib" ]; then
                cp "$dir/$lib" build/linux/x64/release/bundle/lib/
                echo "✓ Copied $lib to bundle"
                break
              fi
            done
          done

          echo "=== Bundled libraries ==="
          ls -lh build/linux/x64/release/bundle/lib/*.so 2>/dev/null || echo "No .so files"

      - name: Verify GPU library
        run: |
          LIB=build/linux/x64/release/bundle/lib/libmeme_llm.so
          if [ -f "$LIB" ]; then
            SIZE=$(stat -c%s "$LIB" | numfmt --to=iec)
            echo "libmeme_llm.so size: $SIZE"
            # 列出所有 ggml_* 后端符号，便于诊断
            echo "=== ggml backend symbols ==="
            nm "$LIB" 2>/dev/null | grep -oE "ggml_(vulkan|opencl|cuda|metal|cpu|backend)" | sort -u
            if nm "$LIB" 2>/dev/null | grep -q ggml_vulkan; then
              echo "✓ Vulkan backend built"
            else
              echo "✗ No Vulkan symbols - stub version built"
            fi
          elif [ -f build/linux/x64/release/bundle/lib/libmeme_llm_empty.so ]; then
            echo "⚠ Only stub library built (no GPU support)"

          # 检查 Tesseract OCR 库
          TESS_LIB=build/linux/x64/release/bundle/lib/libtesseract_ocr.so
          if [ -f "$TESS_LIB" ]; then
            echo "✓ Found libtesseract_ocr.so"
            nm "$TESS_LIB" 2>/dev/null | grep -q "tess_" && echo "✓ Tesseract FFI symbols found"
          else
            echo "NOTE: libtesseract_ocr.so not found (OCR will use CLI fallback)"
          fi
          else
            echo "✗ No meme_llm library found"
            exit 1
          fi

      - name: Package Linux artifact
        run: |
          cd build/linux/x64/release/bundle
          zip -r mememaster-${{ env.VERSION }}-linux-x64-vulkan.zip .
          cd ../../../../..
          mv build/linux/x64/release/bundle/mememaster-${{ env.VERSION }}-linux-x64-vulkan.zip .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-linux-x64-vulkan
          path: mememaster-${{ env.VERSION }}-linux-x64-vulkan.zip
          retention-days: 7

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Flutter
        run: |
          FLUTTER_VERSION=3.44.0
          if [ ! -d "$HOME/flutter" ]; then
            # macos 用 zip 格式（不是 tar.xz），用 unzip 解压
            curl -sSL "https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_${FLUTTER_VERSION}-stable.zip" -o /tmp/flutter.zip
            unzip -q /tmp/flutter.zip -d $HOME
            rm /tmp/flutter.zip
          fi
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Install pango for Tesseract
        run: |
          # Install pango + dependencies (cairo, fontconfig) for tesseract training tools configure
          brew install pango 2>&1 || true

      - name: Init third-party (clone deps)
        run: |
          echo "=== Running init-third-party.sh ==="
          ./scripts/init-third-party.sh 2>&1 | tee /tmp/init-output.txt
          INIT_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "=== init-third-party.sh exit code: $INIT_EXIT ==="
          if [ $INIT_EXIT -ne 0 ]; then
            echo "⚠️ Script exited with error (see above)"
          fi
          echo ""
          echo "=== third_party contents ==="
          ls -la third_party/ 2>/dev/null || echo "third_party missing"
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp
          TESSERACT_DIR: ${{ github.workspace }}/third_party/tesseract
          LEPTONICA_DIR: ${{ github.workspace }}/third_party/leptonica

      - name: Build LLM (Metal)
        run: bash -x ./scripts/build-macos-llm.sh 2>&1
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp
          TESSERACT_DIR: ${{ github.workspace }}/third_party/tesseract
          LEPTONICA_DIR: ${{ github.workspace }}/third_party/leptonica

      - name: Build macOS
        run: flutter build macos --release

      - name: Bundle native library into app
        run: |
          if [ ! -f "build/macos-llm/libmeme_llm.dylib" ]; then
            echo "WARNING: build/macos-llm/libmeme_llm.dylib not found, skipping bundle step"
            exit 0
          fi
          APP=$(find build/macos/Build/Products/Release -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "WARNING: No .app bundle found in build/macos/Build/Products/Release, skipping bundle step"
            exit 0
          fi
          FRAMEWORKS="$APP/Contents/Frameworks"
          mkdir -p "$FRAMEWORKS"

          # 复制主库
          cp build/macos-llm/libmeme_llm.dylib "$FRAMEWORKS/"
          echo "✓ Copied libmeme_llm.dylib to $FRAMEWORKS"

          # tesseract 安装目录（bundled 模式）
          TESSERACT_INSTALL_DIR="build/macos-llm/install"

          # 复制 tesseract_ocr 封装库（如果存在）
          TESS_OCR_FILE=$(find build/macos-llm -name "libtesseract_ocr.dylib" -type f 2>/dev/null | head -1)
          if [ -n "$TESS_OCR_FILE" ]; then
            cp "$TESS_OCR_FILE" "$FRAMEWORKS/"
            echo "✓ Copied libtesseract_ocr.dylib to $FRAMEWORKS"
          else
            echo "=== Searching for tesseract_ocr in build tree ==="
            find build/macos-llm -name "*tesseract*" -type f 2>/dev/null | head -20 || echo "No tesseract files found"
            echo "NOTE: libtesseract_ocr.dylib not found (OCR will use CLI fallback)"
          fi
          if [ ! -f "$FRAMEWORKS/libtesseract_ocr.dylib" ]; then
            echo "NOTE: libtesseract_ocr.dylib not found (OCR may use CLI fallback)"
          fi

          # 复制 tesseract 和 leptonica 库（如果存在）
          # 注意：leptonica 可能安装了 libleptonica.6.0.0.dylib（带版本号）
          for lib in libtesseract.dylib libleptonica.dylib libleptonica.6.dylib libleptonica.6.0.dylib libleptonica.6.0.0.dylib; do
            for dir in "build/macos-llm" "build/macos-llm/local/lib" "$TESSERACT_INSTALL_DIR/lib"; do
              if [ -f "$dir/$lib" ]; then
                cp "$dir/$lib" "$FRAMEWORKS/"
                echo "✓ Copied $lib to $FRAMEWORKS"
                break
              fi
            done
          done

          # 复制 tessdata 到 Resources（macOS app bundle 结构）
          TESSDATA_DIR="$APP/Contents/Resources/tessdata"
          mkdir -p "$TESSDATA_DIR"
          TESSDATA_URL="https://raw.githubusercontent.com/tesseract-ocr/tessdata/main"
          for lang in eng chi_sim; do
            if [ ! -f "$TESSDATA_DIR/${lang}.traineddata" ]; then
              echo "Downloading ${lang}.traineddata..."
              curl -sSL "${TESSDATA_URL}/${lang}.traineddata" -o "$TESSDATA_DIR/${lang}.traineddata"
            fi
          done
          echo "=== Tessdata ==="
          ls -lh "$TESSDATA_DIR"/*.traineddata 2>/dev/null || echo "No tessdata"

          echo "=== Bundled libraries ==="
          ls -lh "$FRAMEWORKS"/*.dylib 2>/dev/null || echo "No dylibs in Frameworks"

          # 检查 libtesseract_ocr.dylib 的依赖链
          if [ -f "$FRAMEWORKS/libtesseract_ocr.dylib" ]; then
            echo "=== libtesseract_ocr.dylib dependencies ==="
            otool -L "$FRAMEWORKS/libtesseract_ocr.dylib" 2>/dev/null || echo "Cannot read dependencies"
          fi

          # 修复依赖库的 install name（bundled 模式下用 @loader_path）
          for lib in "$FRAMEWORKS"/libtesseract*.dylib "$FRAMEWORKS"/libleptonica*.dylib; do
            if [ -f "$lib" ]; then
              # 记录原始 install name
              ORIGINAL_ID=$(otool -D "$lib" 2>/dev/null | grep -E "^/Users" | head -1 | tr -d ':')
              if [ -n "$ORIGINAL_ID" ]; then
                BASENAME=$(basename "$lib")
                echo "Fixing install name: $ORIGINAL_ID -> @loader_path/$BASENAME"
                install_name_tool -id "@loader_path/$BASENAME" "$lib" 2>/dev/null || echo "  (install_name_tool failed, may be OK)"
              fi
            fi
          done

          # 拷贝 libleptonica 的 Homebrew 传递依赖（sandbox 下 /opt/homebrew/ 不可访问）
          echo "=== Bundling Homebrew transitive dependencies ==="
          DEPS_COPIED=()
          for lib in "$FRAMEWORKS"/libleptonica*.dylib "$FRAMEWORKS"/libtesseract*.dylib; do
            [ -f "$lib" ] || continue
            otool -L "$lib" 2>/dev/null | grep '/opt/homebrew/' | while read line; do
              dep_path=$(echo "$line" | awk '{print $1}')
              dep_name=$(basename "$dep_path")
              if [ ! -f "$FRAMEWORKS/$dep_name" ] && [ -f "$dep_path" ]; then
                echo "  Copying: $dep_name (from $dep_path)"
                cp "$dep_path" "$FRAMEWORKS/"
                install_name_tool -id "@loader_path/$dep_name" "$FRAMEWORKS/$dep_name" 2>/dev/null || true
                install_name_tool -change "$dep_path" "@loader_path/$dep_name" "$lib" 2>/dev/null || true
              fi
            done
          done

          # 迭代处理传递依赖（如 libtiff 依赖 libjpeg）
          for i in 1 2 3; do
            for lib in "$FRAMEWORKS"/libjpeg*.dylib "$FRAMEWORKS"/libpng*.dylib "$FRAMEWORKS"/libtiff*.dylib "$FRAMEWORKS"/libwebp*.dylib "$FRAMEWORKS"/libgif*.dylib "$FRAMEWORKS"/libsharpyuv*.dylib "$FRAMEWORKS"/libfribidi*.dylib "$FRAMEWORKS"/libdatrie*.dylib "$FRAMEWORKS"/libthai*.dylib "$FRAMEWORKS"/libpango*.dylib "$FRAMEWORKS"/libharfbuzz*.dylib "$FRAMEWORKS"/libfontconfig*.dylib "$FRAMEWORKS"/libfreetype*.dylib "$FRAMEWORKS"/libpng16*.dylib; do
              [ -f "$lib" ] || continue
              otool -L "$lib" 2>/dev/null | grep '/opt/homebrew/' | while read line; do
                dep_path=$(echo "$line" | awk '{print $1}')
                dep_name=$(basename "$dep_path")
                if [ ! -f "$FRAMEWORKS/$dep_name" ] && [ -f "$dep_path" ]; then
                  echo "  Copying transitive dep: $dep_name"
                  cp "$dep_path" "$FRAMEWORKS/"
                  install_name_tool -id "@loader_path/$dep_name" "$FRAMEWORKS/$dep_name" 2>/dev/null || true
                  install_name_tool -change "$dep_path" "@loader_path/$dep_name" "$lib" 2>/dev/null || true
                fi
              done
            done
          done

          echo "=== Homebrew dependencies bundled ==="
          ls "$FRAMEWORKS"/*.dylib 2>/dev/null | wc -l | xargs -I {} echo "Total dylibs: {}"

          # 修复 libtesseract_ocr.dylib 对外的依赖引用（指向 @loader_path）
          if [ -f "$FRAMEWORKS/libtesseract_ocr.dylib" ]; then
            echo "=== Fixing libtesseract_ocr.dylib dependency paths ==="
            # 找出所有引用 local build 目录的依赖，改为 @loader_path
            for old_path in $(otool -L "$FRAMEWORKS/libtesseract_ocr.dylib" 2>/dev/null | grep "build/macos-llm" | awk '{print $1}'); do
              BASENAME=$(basename "$old_path")
              echo "  Replacing: $old_path -> @loader_path/$BASENAME"
              install_name_tool -change "$old_path" "@loader_path/$BASENAME" "$FRAMEWORKS/libtesseract_ocr.dylib" 2>/dev/null || echo "    (failed)"
            done
            echo "=== After fix ==="
            otool -L "$FRAMEWORKS/libtesseract_ocr.dylib" 2>/dev/null | grep -E "@loader_path|build/macos-llm" || echo "  (no more absolute paths to build dir)"

            # 添加 LC_RPATH 让 @rpath 能被 dyld 正确解析
            echo "=== Adding LC_RPATH for @rpath resolution ==="
            install_name_tool -add_rpath "@executable_path/../Frameworks" "$FRAMEWORKS/libtesseract_ocr.dylib" 2>/dev/null && echo "✓ Added @executable_path/../Frameworks to LC_RPATH" || echo "  (add_rpath failed, may already exist)"
            install_name_tool -add_rpath "@loader_path" "$FRAMEWORKS/libtesseract_ocr.dylib" 2>/dev/null && echo "✓ Added @loader_path to LC_RPATH" || echo "  (add_rpath failed, may already exist)"
            echo "=== LC_RPATH after fix ==="
            otool -l "$FRAMEWORKS/libtesseract_ocr.dylib" 2>/dev/null | grep -A2 RPATH || echo "  (no RPATH found)"
          fi

          # 重新签名所有修改过的 dylib（install_name_tool 会破坏代码签名）
          echo "=== Re-signing modified dylibs ==="
          for lib in "$FRAMEWORKS"/*.dylib; do
            [ -f "$lib" ] || continue
            codesign --force --sign - "$lib" 2>/dev/null && echo "✓ Signed $(basename "$lib")" || echo "  (sign failed for $(basename "$lib"))"
          done
          # 重新签名整个 app bundle
          codesign --force --deep --sign - "$APP" 2>/dev/null && echo "✓ Signed app bundle" || echo "  (app bundle sign failed)"

      - name: Verify Metal library
        run: |
          # Search in build output directory
          LIB=$(find build/macos-llm -name "libmeme_llm.dylib" -type f 2>/dev/null | head -1)
          if [ -z "$LIB" ]; then
            # Search in app bundle
            LIB=$(find build/macos/Build/Products/Release -name "libmeme_llm.dylib" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$LIB" ]; then
            ls -lh "$LIB"
            if nm "$LIB" 2>/dev/null | grep -q ggml_metal; then
              echo "✓ Metal symbols found"
            else
              echo "⚠ No Metal symbols found in $LIB"
            fi
          else
            echo "⚠ No libmeme_llm.dylib found in build/macos-llm or app bundle (this is OK if Tesseract bundling is not needed)"
          fi

          # 检查 Tesseract OCR 库
          TESS_LIB=$(find build/macos-llm -name "libtesseract_ocr.dylib" -type f 2>/dev/null | head -1)
          if [ -n "$TESS_LIB" ]; then
            echo "✓ Found libtesseract_ocr.dylib: $TESS_LIB"
            ls -lh "$TESS_LIB"
            if nm "$TESS_LIB" 2>/dev/null | grep -q "tess_"; then
              echo "✓ Tesseract FFI symbols found"
            else
              echo "⚠ No tess_* symbols found in $TESS_LIB"
            fi
          else
            echo "NOTE: libtesseract_ocr.dylib not found (OCR will use CLI fallback)"
          fi

      - name: Package macOS artifact
        run: |
          APP=$(find build/macos/Build/Products/Release -name "*.app" -type d | head -1)
          zip -r mememaster-${{ env.VERSION }}-macos-arm64-metal.zip "$APP"
          ls -lh mememaster-${{ env.VERSION }}-macos-arm64-metal.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-macos-arm64-metal
          path: mememaster-${{ env.VERSION }}-macos-arm64-metal.zip
          retention-days: 7

  android-vulkan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build unzip curl xz-utils
      - name: Setup Flutter
        run: |
          FLUTTER_VERSION=3.44.0
          if [ ! -d "$HOME/flutter" ]; then
            curl -sSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz | tar xJ -C $HOME
          fi
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v3

      # Pre-fetch gradle distribution to avoid timeout during gradlew run
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Init third-party
        run: ./scripts/init-third-party.sh || echo "⚠️ Network issues - building stub"

      - name: Debug SPIRV-Headers install
        run: |
          echo "=== third_party contents ==="
          ls -la third_party/
          echo ""
          echo "=== spirv-headers-install ==="
          ls -la third_party/spirv-headers-install/ 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== SPIRV-HeadersConfig.cmake ==="
          find third_party -name "SPIRV-HeadersConfig.cmake" 2>/dev/null
          find third_party -name "spirv-headers*" -type d 2>/dev/null
          echo ""
          echo "=== Manual SPIRV-Headers cmake (if needed) ==="
          if [ ! -f third_party/spirv-headers-install/share/cmake/SPIRV-Headers/SPIRV-HeadersConfig.cmake ]; then
            echo "Running cmake manually to diagnose..."
            cd third_party/SPIRV-Headers
            mkdir -p build
            cd build
            cmake .. -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/third_party/spirv-headers-install" -DSPIRV_HEADERS_SKIP_EXAMPLES=ON 2>&1 | tail -20
            echo "--- cmake build ---"
            cmake --build . --target install 2>&1 | tail -30
          fi

      - name: Configure Gradle memory
        run: |
          mkdir -p android
          echo "org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m" > android/gradle.properties
           echo "org.gradle.parallel=true" >> android/gradle.properties
           echo "android.useAndroidX=true" >> android/gradle.properties
           echo "android.enableJetifier=false" >> android/gradle.properties

      - name: Setup Android signing
        run: |
          keytool -genkey -v -keystore android/app/release-keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias mememaster -storepass mememaster -keypass mememaster -dname "CN=MemeMaster, OU=Development, O=MemeMaster, L=Shanghai, ST=Shanghai, C=CN"
          printf 'storePassword=mememaster\nkeyPassword=mememaster\nkeyAlias=mememaster\nstoreFile=release-keystore.jks\n' > android/key.properties

      - name: Debug signing files
        run: |
          echo "=== key.properties ==="
          cat android/key.properties
          echo ""
          echo "=== keystore file ==="
          ls -la android/app/release-keystore.jks
          echo ""
          echo "=== pwd ==="
          pwd

      - name: Build Android APK
        run: |
          flutter build apk --release 2>&1
          echo "=== Build exit code: $? ==="
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK: ${{ env.ANDROID_NDK }}
          GRADLE_OPTS: "-Dorg.gradle.caching=false"

      - name: Verify APK size
        run: |
          echo "=== Check flutter-apk ==="
          ls -la build/app/outputs/flutter-apk/ 2>&1 || echo "No flutter-apk dir"
          echo "=== Final check ==="
          APK="build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK" ]; then
            SIZE=$(stat -c%s "$APK" | numfmt --to=iec)
            echo "APK: $APK"
            echo "Size: $SIZE"
          else
            echo "⚠ No APK found at $APK"
            exit 1
          fi

      - name: Find and copy APK
        run: |
          # Flutter builds APK to build/app/outputs/flutter-apk/
          # 直接复制正确路径，避免 find 选错文件
          cp build/app/outputs/flutter-apk/app-release.apk ./android.apk
          ls -la ./android.apk

      - name: Rename Android artifact
        run: mv android.apk mememaster-${{ env.VERSION }}-android-arm64-vulkan.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-android-arm64-vulkan
          path: mememaster-${{ env.VERSION }}-android-arm64-vulkan.apk
          retention-days: 7

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Flutter
        shell: pwsh
        run: |
          $flutterVersion = "${{ env.flutter-version }}"
          $flutterPath = "$env:USERPROFILE\flutter"
          if (-not (Test-Path $flutterPath)) {
            Write-Host "Downloading Flutter $flutterVersion for Windows..."
            $url = "https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_${flutterVersion}-stable.zip"
            curl.exe -L $url -o "$env:TEMP\flutter.zip"
            Expand-Archive -Path "$env:TEMP\flutter.zip" -DestinationPath "$env:USERPROFILE" -Force
            Remove-Item "$env:TEMP\flutter.zip"
          }
          Add-Content -Path $env:GITHUB_PATH -Value "$flutterPath\bin"

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Windows runner files
        shell: pwsh
        run: |
          # Remove incomplete windows directory (except cpp/ which has our native code)
          Get-ChildItem windows | Where-Object { $_.Name -ne 'cpp' } | Remove-Item -Recurse -Force
          # Generate fresh Windows runner files in current directory
          flutter create --platforms=windows .

      - name: Init third-party (Vulkan)
        shell: pwsh
        run: |
          if (-not (Test-Path "third_party\llama.cpp")) {
            git clone --depth 1 https://github.com/ggml-org/llama.cpp.git third_party\llama.cpp
          }
          if (-not (Test-Path "third_party\spirv-headers-install")) {
            git clone --depth 1 https://github.com/KhronosGroup/SPIRV-Headers.git third_party\SPIRV-Headers
            mkdir -p third_party\spirv-headers-build
            cmake -S third_party\SPIRV-Headers -B third_party\spirv-headers-build -DCMAKE_INSTALL_PREFIX="$env:GITHUB_WORKSPACE\third_party\spirv-headers-install" -DSPIRV_HEADERS_SKIP_EXAMPLES=ON -DSPIRV_HEADERS_SKIP_TESTS=ON
            cmake --build third_party\spirv-headers-build --config Release
            cmake --install third_party\spirv-headers-build --config Release
          }

      - name: Download Vulkan SDK
        shell: pwsh
        run: |
          $VULKAN_VERSION = "1.3.296.0"
          $VULKAN_SDK_DIR = Join-Path $env:GITHUB_WORKSPACE "vulkan-sdk"

          if (Test-Path $VULKAN_SDK_DIR) {
            Write-Host "Vulkan SDK already exists at $VULKAN_SDK_DIR"
          } else {
            Write-Host "Downloading Vulkan SDK $VULKAN_VERSION..."
            $INSTALLER_URL = "https://sdk.lunarg.com/sdk/download/$VULKAN_VERSION/windows/VulkanSDK-${VULKAN_VERSION}-Installer.exe"
            $INSTALLER_PATH = Join-Path $env:TEMP "VulkanSDK-Installer.exe"

            try {
              Invoke-WebRequest -Uri $INSTALLER_URL -OutFile $INSTALLER_PATH -TimeoutSec 600
              Write-Host "Downloaded Vulkan SDK installer ($([math]::Round((Get-Item $INSTALLER_PATH).Length / 1MB, 1)) MB)"

              # 静默安装
              Write-Host "Installing Vulkan SDK to $VULKAN_SDK_DIR..."
              $proc = Start-Process -FilePath $INSTALLER_PATH -ArgumentList "/S" -PassThru -NoNewWindow
              $proc.WaitForExit()
              Write-Host "Installer exited with code: $($proc.ExitCode)"

              # 查找安装位置 (安装程序会放到默认位置)
              $DEFAULT_INSTALL_PATH = "C:\VulkanSDK\$VULKAN_VERSION"
              if (Test-Path $DEFAULT_INSTALL_PATH) {
                Write-Host "Vulkan SDK installed to default location: $DEFAULT_INSTALL_PATH"
                # 复制到工作目录方便引用
                Copy-Item $DEFAULT_INSTALL_PATH $VULKAN_SDK_DIR -Recurse -Force
                Write-Host "Copied to $VULKAN_SDK_DIR"
              }

              # 验证
              if (Test-Path "$VULKAN_SDK_DIR\Include\vulkan\vulkan.h") {
                Write-Host "Vulkan SDK ready at $VULKAN_SDK_DIR"
              } else {
                Write-Host "WARNING: vulkan.h not found"
                Write-Host "Vulkan SDK installation may have failed"
              }
            } catch {
              Write-Host "WARNING: Failed to download/install Vulkan SDK: $_"
            }
          }

          # 设置环境变量供后续步骤使用
          if (Test-Path $VULKAN_SDK_DIR) {
            Write-Host "VULKAN_SDK=$VULKAN_SDK_DIR"
            Write-Host "##vso[task.setvariable variable=VULKAN_SDK]$VULKAN_SDK_DIR"
          }
        id: vulkan

      - name: Download Tesseract DLLs
        shell: pwsh
        run: |
          if (Test-Path "third_party\tesseract-dlls") {
            Write-Host "Tesseract DLLs already exist, skipping download"
            exit 0
          }
          Write-Host "Downloading Tesseract DLLs..."
          $ErrorActionPreference = "Continue"
          powershell -ExecutionPolicy Bypass -File ".\scripts\download-tesseract-dlls.ps1"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "WARNING: Failed to download Tesseract DLLs (exit code $LASTEXITCODE). OCR will use CLI fallback."
          } else {
            Write-Host "Tesseract DLLs downloaded successfully"
          }
          exit 0

      - name: Build meme_llm.dll (Vulkan)
        shell: pwsh
        run: |
          $VULKAN_SDK_DIR = Join-Path $env:GITHUB_WORKSPACE "vulkan-sdk"

          # 设置 VULKAN_SDK 环境变量
          if (Test-Path $VULKAN_SDK_DIR) {
            Write-Host "Setting VULKAN_SDK=$VULKAN_SDK_DIR"
            $env:VULKAN_SDK = $VULKAN_SDK_DIR
          } else {
            Write-Host "VULKAN_SDK not found, building CPU-only"
          }

          cmake -S windows/cpp -B build/windows-llm -DENABLE_VULKAN=ON -DENABLE_OPENCL=OFF -DENABLE_CUDA=OFF -DLLAMA_CPP_DIR="$env:GITHUB_WORKSPACE\third_party\llama.cpp" -DSPIRV_HEADERS_DIR="$env:GITHUB_WORKSPACE\third_party\spirv-headers-install"
          cmake --build build/windows-llm --config Release

      - name: Build Windows
        shell: pwsh
        run: flutter build windows --release

      - name: Bundle native library
        shell: pwsh
        run: |
          $FLUTTER_DIR = "build\windows\x64\runner\Release"
          $DLL_SOURCE = "build\windows-llm\Release\meme_llm.dll"
          if (Test-Path $DLL_SOURCE) {
            Copy-Item $DLL_SOURCE -Destination $FLUTTER_DIR\ -Force
            Write-Host "Copied meme_llm.dll to $FLUTTER_DIR"
          }

          # Copy Tesseract DLLs to bundle
          $TESS_DLL_DIR = "third_party\tesseract-dlls"
          if (Test-Path $TESS_DLL_DIR) {
            Get-ChildItem "$TESS_DLL_DIR\*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination $FLUTTER_DIR\ -Force
              Write-Host "Copied $($_.Name)"
            }
          }

          # Copy tessdata to bundle
          $TESSDATA_DIR = "$FLUTTER_DIR\tessdata"
          if (Test-Path "$TESS_DLL_DIR\tesseract\tessdata") {
            New-Item -ItemType Directory -Force -Path $TESSDATA_DIR | Out-Null
            Copy-Item "$TESS_DLL_DIR\tesseract\tessdata\*" -Destination $TESSDATA_DIR\ -Force
            Write-Host "Copied tessdata files"
            Get-ChildItem $TESSDATA_DIR\*.traineddata | ForEach-Object { Write-Host "  $($_.Name)" }
          } else {
            # Download tessdata if not present (use curl.exe which follows redirects)
            Write-Host "Downloading tessdata..."
            New-Item -ItemType Directory -Force -Path $TESSDATA_DIR | Out-Null
            $TESSDATA_URL = "https://raw.githubusercontent.com/tesseract-ocr/tessdata/main"
            foreach ($lang in @("eng", "chi_sim")) {
              $filePath = "$TESSDATA_DIR\${lang}.traineddata"
              if (-not (Test-Path $filePath)) {
                Write-Host "  Downloading ${lang}.traineddata..."
                curl.exe -L "$TESSDATA_URL/${lang}.traineddata" -o $filePath --retry 3 --retry-delay 5
              }
            }
          }

          Get-ChildItem "$FLUTTER_DIR\*.dll" | ForEach-Object { Write-Host $_.Name }

      - name: Verify DLL
        shell: pwsh
        run: |
          $DLL = "build\windows\x64\runner\Release\meme_llm.dll"
          if (Test-Path $DLL) {
            $size = (Get-Item $DLL).Length / 1MB
            Write-Host "meme_llm.dll size: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "No meme_llm.dll found - may be using stub"
          }

      - name: Verify Tesseract DLLs
        shell: pwsh
        run: |
          $FLUTTER_DIR = "build\windows\x64\runner\Release"
          $TESS_DLLS = Get-ChildItem "$FLUTTER_DIR\tesseract*.dll" -ErrorAction SilentlyContinue
          $LEPT_DLLS = Get-ChildItem "$FLUTTER_DIR\leptonica*.dll" -ErrorAction SilentlyContinue
          if ($TESS_DLLS) {
            Write-Host "Tesseract DLLs found:"
            $TESS_DLLS | ForEach-Object { Write-Host "  $($_.Name) ($(($_.Length / 1MB).ToString('0.00')) MB)" }
          } else {
            Write-Host "No Tesseract DLLs in bundle"
          }
          if ($LEPT_DLLS) {
            Write-Host "Leptonica DLLs found:"
            $LEPT_DLLS | ForEach-Object { Write-Host "  $($_.Name) ($(($_.Length / 1MB).ToString('0.00')) MB)" }
          }

      - name: Package Windows artifact
        shell: pwsh
        run: |
          $BUNDLE = "build\windows\x64\runner\Release"
          $VERSION = "${{ env.VERSION }}"
          Compress-Archive -Path "$BUNDLE\*" -DestinationPath "mememaster-${VERSION}-windows-x64-vulkan.zip" -Force
          Get-Item "mememaster-${VERSION}-windows-x64-vulkan.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-windows-x64-vulkan
          path: mememaster-${{ env.VERSION }}-windows-x64-vulkan.zip
          retention-days: 7

  release:
    needs: [linux, macos, android-vulkan, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download Linux Vulkan
        uses: actions/download-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-linux-x64-vulkan
          path: artifacts/linux-vulkan

      - name: Download macOS Metal
        uses: actions/download-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-macos-arm64-metal
          path: artifacts/macos-metal

      - name: Download Android Vulkan
        uses: actions/download-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-android-arm64-vulkan
          path: artifacts/android-vulkan

      - name: Download Windows Vulkan
        uses: actions/download-artifact@v4
        with:
          name: mememaster-${{ env.VERSION }}-windows-x64-vulkan
          path: artifacts/windows-vulkan

      - name: Debug artifacts structure
        run: |
          echo "=== Linux Vulkan bundle ==="
          find artifacts/linux-vulkan -type f | head -10
          echo "=== macOS Metal ==="
          find artifacts/macos-metal -type f | head -10
          echo "=== Android ==="
          find artifacts/android* -type f | head -10
          echo "=== Windows Vulkan ==="
          find artifacts/windows-vulkan -type f | head -10

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          name: MemeMaster v${{ env.VERSION }}
          body: "Release v${{ env.VERSION }}"
          files: |
            artifacts/linux-vulkan/mememaster-${{ env.VERSION }}-linux-x64-vulkan.zip
            artifacts/macos-metal/mememaster-${{ env.VERSION }}-macos-arm64-metal.zip
            artifacts/android-vulkan/mememaster-${{ env.VERSION }}-android-arm64-vulkan.apk
            artifacts/windows-vulkan/mememaster-${{ env.VERSION }}-windows-x64-vulkan.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
