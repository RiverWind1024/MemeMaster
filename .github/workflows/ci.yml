name: CI

on:
  push:
    branches: [master, release/*, feat/*]
  pull_request:
    branches: [master, release/*]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  flutter-version: '3.44.0'
  java-version: '17'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Flutter
        uses: actions/setupFlutter@v5
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  linux:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build clang libsecret-1-dev libgtk-3-dev \
            tesseract tesseract-langpack-chi_sim \
            vulkan-loader glslc glslang spirv-tools

      - name: Setup Flutter
        uses: actions/setupFlutter@v5
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Init third-party (Vulkan)
        run: ./scripts/init-third-party.sh
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp
          SPIRV_HEADERS_DIR: ${{ github.workspace }}/third_party/spirv-headers-install
          GLSLC_DIR: /usr/bin

      - name: Build Linux (Vulkan GPU)
        run: |
          rm -rf build/linux
          SPIRV_HEADERS_DIR=${{ github.workspace }}/third_party/spirv-headers-install \
          LLAMA_CPP_DIR=${{ github.workspace }}/third_party/llama.cpp \
          ENABLE_VULKAN=ON \
          flutter build linux --release

      - name: Verify GPU library
        run: |
          SIZE=$(stat -c%s build/linux/x64/release/bundle/lib/libmeme_llm.so | numfmt --to=iec-i8)
          echo "libmeme_llm.so size: $SIZE"
          if nm build/linux/x64/release/bundle/lib/libmeme_llm.so 2>/dev/null | grep -q ggml_vulkan; then
            echo "✓ Vulkan symbols found"
          else
            echo "✗ No Vulkan symbols - stub version built"
            exit 1
          fi

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-vulkan-${{ github.sha }}
          path: build/linux/x64/release/bundle/
          retention-days: 7

  linux-cpu:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build clang libsecret-1-dev libgtk-3-dev \
            tesseract tesseract-langpack-chi_sim

      - name: Setup Flutter
        uses: actions/setupFlutter@v5
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Init third-party (CPU only)
        run: ./scripts/init-third-party.sh
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp

      - name: Build Linux (CPU only)
        run: |
          rm -rf build/linux
          flutter build linux --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-cpu-${{ github.sha }}
          path: build/linux/x64/release/bundle/
          retention-days: 7

  macos:
    needs: analyze
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install macOS dependencies
        run: |
          brew install tesseract tesseract-langpack-chi_sim leptonica

      - name: Setup Flutter
        uses: actions/setupFlutter@v5
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Init third-party
        run: ./scripts/init-third-party.sh
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp

      - name: Build C++ library (Metal GPU)
        run: ./scripts/build-macos-llm.sh
        env:
          LLAMA_CPP_DIR: ${{ github.workspace }}/third_party/llama.cpp

      - name: Build macOS
        run: flutter build macos --release

      - name: Verify Metal library
        run: |
          find build/macos -name "libmeme_llm.dylib" -exec sh -c '
            SIZE=$(stat -f%z "$1" | numfmt --to=iec-i8)
            echo "libmeme_llm.dylib size: $SIZE"
            if nm "$1" 2>/dev/null | grep -q ggml_metal; then
              echo "✓ Metal symbols found"
            else
              echo "✗ No Metal symbols"
              exit 1
            fi
          ' _ {} \;

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ github.sha }}
          path: build/macos/Build/Products/Release/
          retention-days: 7

  android:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build unzip

      - name: Setup Java
        uses: actions/setupJava@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.java-version }}

      - name: Setup Flutter
        uses: actions/setupFlutter@v5
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Init third-party
        run: ./scripts/init-third-party.sh
        env:
          ANDROID_NDK: ${{ env.ANDROID_NDK }}

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"
        env:
          ANDROID_HOME: /opt/android-sdk
          ANDROID_NDK: /opt/android-ndk

      - name: Verify APK size
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          SIZE=$(stat -c%s "$APK" | numfmt --to=iec-i8)
          echo "APK: $APK"
          echo "Size: $SIZE"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7

  android-debug:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build unzip

      - name: Setup Java
        uses: actions/setupJava@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.java-version }}

      - name: Setup Flutter
        uses: actions/setupFlutter@v5
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Init third-party
        run: ./scripts/init-third-party.sh

      - name: Build Android APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"
        env:
          ANDROID_HOME: /opt/android-sdk

      - name: Upload Android debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
