name: Build Android APK

on:
  push:
    branches: [master, release/*, feat/*]
  pull_request:
    branches: [master, release/*]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build unzip curl xz-utils

      - name: Setup Flutter
        run: |
          FLUTTER_VERSION=3.44.0
          if [ ! -d "$HOME/flutter" ]; then
            curl -sSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz | tar xJ -C $HOME
          fi
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Remove super_clipboard for Android (cargokit incompatible with Gradle 8)
        run: |
          # super_clipboard is desktop-only; cargokit fails on Gradle 8 - not needed for Android APK
          cp pubspec.yaml pubspec.yaml.bak
          sed -i '/^  super_clipboard:/d' pubspec.yaml
          flutter pub get
          mv pubspec.yaml.bak pubspec.yaml

      - name: Init third-party dependencies
        run: |
          echo "=== Running init-third-party.sh ==="
          ./scripts/init-third-party.sh 2>&1 | tee /tmp/init-output.txt
          INIT_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "=== init-third-party.sh exit code: $INIT_EXIT ==="
          if [ $INIT_EXIT -ne 0 ]; then
            echo "⚠️ Script exited with error (see above)"
          fi

      - name: Debug SPIRV-Headers install
        run: |
          echo "=== third_party contents ==="
          ls -la third_party/
          echo ""
          echo "=== spirv-headers-install ==="
          ls -la third_party/spirv-headers-install/ 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== SPIRV-HeadersConfig.cmake ==="
          find third_party -name "SPIRV-HeadersConfig.cmake" 2>/dev/null
          find third_party -name "spirv-headers*" -type d 2>/dev/null
          echo ""
          echo "=== Manual SPIRV-Headers cmake (if needed) ==="
          if [ ! -f third_party/spirv-headers-install/share/cmake/SPIRV-Headers/SPIRV-HeadersConfig.cmake ]; then
            echo "Running cmake manually to diagnose..."
            cd third_party/SPIRV-Headers
            mkdir -p build
            cd build
            cmake .. -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/third_party/spirv-headers-install" -DSPIRV_HEADERS_SKIP_EXAMPLES=ON 2>&1 | tail -20
            echo "--- cmake build ---"
            cmake --build . --target install 2>&1 | tail -30
          fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Gradle memory
        run: |
          mkdir -p android
          echo "org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m" > android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=false" >> android/gradle.properties

      - name: Build Android APK
        run: flutter build apk --release --target-platform=android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
