name: Build Android APK

on:
  push:
    branches: [master, release/*, feat/*]
  pull_request:
    branches: [master, release/*]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build unzip curl xz-utils

      - name: Setup Flutter
        run: |
          FLUTTER_VERSION=3.44.0
          if [ ! -d "$HOME/flutter" ]; then
            curl -sSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz | tar xJ -C $HOME
          fi
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Init third-party dependencies
        run: ./scripts/init-third-party.sh || echo "⚠️ Network issues - building stub"

      - name: Debug SPIRV-Headers install
        run: |
          echo "=== third_party contents ==="
          ls -la third_party/
          echo ""
          echo "=== spirv-headers-install ==="
          ls -la third_party/spirv-headers-install/ 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== SPIRV-HeadersConfig.cmake ==="
          find third_party -name "SPIRV-HeadersConfig.cmake" 2>/dev/null
          find third_party -name "spirv-headers*" -type d 2>/dev/null

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Gradle memory
        run: |
          mkdir -p android
          echo "org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m" > android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=false" >> android/gradle.properties

      - name: Patch cargokit plugin.gradle for Gradle 8 Groovy 4
        run: |
          python3 << 'PYEOF'
          import os, glob
          for gradle_file in glob.glob(os.path.expanduser('~/.pub-cache/**/cargokit/gradle/plugin.gradle'), recursive=True):
              with open(gradle_file) as f:
                  content = f.read()
              if "commandLine 'chmod'" not in content:
                  continue
              # Rewrite the entire build() method - replace the old exec blocks with Groovy 4 compatible code
              old_chmod = """        if (!Os.isFamily(Os.FAMILY_WINDOWS)) {
            project.exec {
                commandLine 'chmod', '+x', path
            }
        }"""
              new_chmod = """        if (!Os.isFamily(Os.FAMILY_WINDOWS)) {
            project.exec { setCommandLine(['chmod', '+x', path.toString()]); }
        }"""
              old_exec_block = """        project.exec {
            executable path
            args "build-gradle"
            environment "CARGOKIT_ROOT_PROJECT_DIR", rootProjectDir
            environment "CARGOKIT_TOOL_TEMP_DIR", "${buildDir}/build_tool"
            environment "CARGOKIT_MANIFEST_DIR", manifestDir
            environment "CARGOKIT_CONFIGURATION", buildMode
            environment "CARGOKIT_TARGET_TEMP_DIR", buildDir
            environment "CARGOKIT_OUTPUT_DIR", outputDir
            environment "CARGOKIT_NDK_VERSION", ndkVersion
            environment "CARGOKIT_SDK_DIR", sdkDirectory
            environment "CARGOKIT_COMPILE_SDK_VERSION", compileSdkVersion
            environment "CARGOKIT_MIN_SDK_VERSION", minSdkVersion
            environment "CARGOKIT_TARGET_PLATFORMS", targetPlatforms.join(",")
            environment "CARGOKIT_JAVA_HOME", System.properties['java.home']
        }"""
              new_exec_block = """        project.exec {
            setExecutable(path.toString())
            args("build-gradle")
            environment([CARGOKIT_ROOT_PROJECT_DIR: rootProjectDir,
                         CARGOKIT_TOOL_TEMP_DIR: "${buildDir}/build_tool",
                         CARGOKIT_MANIFEST_DIR: manifestDir,
                         CARGOKIT_CONFIGURATION: buildMode,
                         CARGOKIT_TARGET_TEMP_DIR: buildDir,
                         CARGOKIT_OUTPUT_DIR: outputDir,
                         CARGOKIT_NDK_VERSION: ndkVersion,
                         CARGOKIT_SDK_DIR: sdkDirectory,
                         CARGOKIT_COMPILE_SDK_VERSION: compileSdkVersion,
                         CARGOKIT_MIN_SDK_VERSION: minSdkVersion,
                         CARGOKIT_TARGET_PLATFORMS: targetPlatforms.join(","),
                         CARGOKIT_JAVA_HOME: System.properties['java.home']])
        }"""
              content = content.replace(old_chmod, new_chmod)
              content = content.replace(old_exec_block, new_exec_block)
              with open(gradle_file, 'w') as f:
                  f.write(content)
              print(f"Patched: {gradle_file}")
          PYEOF

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
