name: Build Android APK

on:
  push:
    branches: [master, release/*, feat/*]
  pull_request:
    branches: [master, release/*]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build unzip curl xz-utils

      - name: Setup Flutter
        run: |
          FLUTTER_VERSION=3.44.0
          if [ ! -d "$HOME/flutter" ]; then
            curl -sSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz | tar xJ -C $HOME
          fi
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Init third-party dependencies
        run: ./scripts/init-third-party.sh || echo "⚠️ Network issues - building stub"

      - name: Debug SPIRV-Headers install
        run: |
          echo "=== third_party contents ==="
          ls -la third_party/
          echo ""
          echo "=== spirv-headers-install ==="
          ls -la third_party/spirv-headers-install/ 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== SPIRV-HeadersConfig.cmake ==="
          find third_party -name "SPIRV-HeadersConfig.cmake" 2>/dev/null
          find third_party -name "spirv-headers*" -type d 2>/dev/null

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Gradle memory
        run: |
          mkdir -p android
          echo "org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m" > android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=false" >> android/gradle.properties

      - name: Patch cargokit plugin.gradle for Gradle 8 Groovy 4
        run: |
          python3 << 'EOF'
          import os, re
          for root, dirs, files in os.walk(os.path.expanduser('~/.pub-cache')):
              for fname in files:
                  if fname == 'plugin.gradle' and 'cargokit' in root:
                      fpath = os.path.join(root, fname)
                      with open(fpath) as f:
                          content = f.read()
                      if "commandLine 'chmod'" in content:
                          # Fix: Gradle 8 Groovy 4 - executable/commandLine must be set via methods
                          content = re.sub(
                              r"project\.exec \{\s*commandLine 'chmod', '\+x', path\s*\}",
                              "project.exec { setCommandLine(['chmod', '+x', path.toString()]); }",
                              content)
                          content = re.sub(
                              r"project\.exec \{\s*executable path\s*",
                              "project.exec { setExecutable(path.toString());\n            ",
                              content)
                          content = content.replace('args "build-gradle"', 'args("build-gradle")')
                          with open(fpath, 'w') as f:
                              f.write(content)
                          print(f"Patched: {fpath}")
          EOF

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
