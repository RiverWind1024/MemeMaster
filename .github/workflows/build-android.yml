name: Build Android APK

on:
  push:
    branches: [master, release/*, feat/*]
  pull_request:
    branches: [master, release/*]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build unzip

      - name: Setup Flutter
        uses: actions/setupFlutter@v5
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Init third-party dependencies
        run: ./scripts/init-third-party.sh || echo "⚠️ Network issues - building stub"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
