name: Sync to Gitee Mirror

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync llama.cpp to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -z "$GITEE_TOKEN" ]; then
            echo "GITEE_TOKEN not set, skipping sync"
            exit 0
          fi
          
          git clone --bare https://github.com/ggml-org/llama.cpp.git /tmp/llama.cpp.git
          cd /tmp/llama.cpp.git
          git push --mirror https://gitee.com/${{ secrets.GITEE_USERNAME }}/llama.cpp.git
