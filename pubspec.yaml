name: mememanager
description: "MemeManager - 表情包管理工具"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.8.1

  # 数据库
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5

  # SQLite 底层库
  sqlite3: ^2.9.4

  # 图片处理
  image: ^4.5.3

  # 文件选择器（Android + Linux）
  file_selector: ^1.1.0

  # 文件哈希
  crypto: ^3.0.6

  # 同步
  flutter_secure_storage: ^9.2.4
  http: ^1.3.0

  # 后台任务 (workmanager Phase 6 引入，当前版本不兼容 Flutter 3.x)
  flutter_isolate: ^2.0.8

  # 序列化
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1

  # OCR
  google_mlkit_text_recognition: ^0.15.1

  # 分享
  share_plus: ^10.1.4
  desktop_drop: ^0.7.1

  # 打开文件/目录（移动平台）
  open_filex: ^4.5.0


  # 持久化
  shared_preferences: ^2.5.5

  # 本地 LLM（通过原生 C API 直接调用 llama.cpp，见 android/app/src/main/cpp/）
  ffi: ^2.1.0

  # 工具
  collection: ^1.19.1
  path: ^1.9.1
  meta: ^1.16.0
  minio: ^3.5.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # 代码生成
  drift_dev: ^2.25.0
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  build_runner: ^2.4.14

  # lint
  flutter_lints: ^6.0.0

  # 测试
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/prompts/
